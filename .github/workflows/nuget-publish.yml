name: Publish NuGet Package

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    - name: 🧾 Checkout code
      uses: actions/checkout@v3

    - name: 🛠️ Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: 📦 Restore dependencies
      run: dotnet restore package/JT.SmartConfigManager/JT.SmartConfigManager/SmartConfigManager.csproj

    - name: 🏗️ Build project
      run: dotnet build package/JT.SmartConfigManager/JT.SmartConfigManager.csproj --configuration Release

    - name: 📦 Pack NuGet package
      run: dotnet pack package/JT.SmartConfigManager/JT.SmartConfigManager.csproj --configuration Release --output out

    - name: 🚀 Publish to NuGet
      run: dotnet nuget push out/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY_SMARTCONFIGMANAGER }}
