name: Publish SmartConfig NuGet Package

on:
  push:
    branches:
      - main
    tags:
      - 'smartconfig-v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: 🧾 Checkout code
        uses: actions/checkout@v3

      - name: 🛠️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: 📦 Restore dependencies
        working-directory: dotnet-package/SmartConfig
        run: dotnet restore JT.SmartConfigManager/JT.SmartConfigManager.csproj

      - name: 🏗️ Build project
        working-directory: dotnet-package/SmartConfig
        run: dotnet build JT.SmartConfigManager/JT.SmartConfigManager.csproj --configuration Release

      - name: 📦 Pack NuGet package
        working-directory: dotnet-package/SmartConfig
        run: dotnet pack JT.SmartConfigManager/JT.SmartConfigManager.csproj --configuration Release --output out

      - name: 🚀 Publish to NuGet
        working-directory: dotnet-package/SmartConfig
        run: dotnet nuget push out/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY_SMARTCONFIGMANAGER }}
